<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 2</title>
</head>
<body>

    <h1>Exercício de Variáveis em JavaScript</h1>

    <script>
        // variáveis
        let texto = "Olá mundo";     // string
        let numero = 10;             // int
        let decimal = 3.14;          // float
        let verdadeiro = true;       // booleano

        // ALERT
        alert("Texto: " + texto + " | Tipo: " + typeof texto);
        alert("Número: " + numero + " | Tipo: " + typeof numero);
        alert("Decimal: " + decimal + " | Tipo: " + typeof decimal);
        alert("Booleano: " + verdadeiro + " | Tipo: " + typeof verdadeiro);

        // CONSOLE
        console.log("Texto:", texto, "| Tipo:", typeof texto);
        console.log("Número:", numero, "| Tipo:", typeof numero);
        console.log("Decimal:", decimal, "| Tipo:", typeof decimal);
        console.log("Booleano:", verdadeiro, "| Tipo:", typeof verdadeiro);
    </script>

</body>
</html>
